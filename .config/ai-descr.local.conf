AI_PROVIDER="openrouter"
AI_URL="http://127.0.0.1:11434/v1/chat/completions"
OPENROUTER_API_KEY=""
AI_MODEL="poolside/laguna-m.1:free"

AI_TEMPERATURE="0.1"
AI_MAX_TOKENS="800"

AI_ENRICH_UNITS="true"
AI_ENRICH_CLASSES="false"
AI_ENRICH_METHODS="false"

#`ai-descr.local.conf` может содержать настройки сразу для обоих AI-provider-ов.

#Если `AI_PROVIDER="openrouter"`:
#- используется `OPENROUTER_API_KEY`;
#- `AI_URL` игнорируется;
#- endpoint OpenRouter задаётся скриптом автоматически.

#Если `AI_PROVIDER="openai-compatible"`:
#- используется `AI_URL`;
#- `OPENROUTER_API_KEY` игнорируется;
#- авторизация не требуется для локальных серверов Ollama/LM Studio, если они её не требуют.

#Для переключения между режимами обычно достаточно изменить `AI_PROVIDER` и `AI_MODEL`.