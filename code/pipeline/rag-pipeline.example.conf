# Локальный конфиг clean MVP pipeline.
# Скопируйте этот файл в rag-pipeline.local.conf и поправьте пути под свою машину.

FINAL_ROOT="D:/Works/учёба/вкр/finalversion"

# Pascal/Delphi проект, который нужно документировать.
PROJECT_ROOT="D:/Works/учёба/вкр/finalversion/data/input_project/src"

# Wiki generation.
WIKI_CODE_DIR="${FINAL_ROOT}/code/wiki"
WIKI_SCRIPT="${WIKI_CODE_DIR}/ai-descr-ai-v3-config-rag-md-v3.sh"
AI_CONFIG="${WIKI_CODE_DIR}/ai-descr.local.conf"

# External RAG backend. Repo должен быть клонирован сюда:
#   git clone https://github.com/mohllal/markdown-rag-mcp.git "${MARKDOWN_RAG_DIR}"
TOOLS_DIR="${FINAL_ROOT}/tools"
MARKDOWN_RAG_DIR="${TOOLS_DIR}/markdown-rag-mcp"
MARKDOWN_RAG_WRAPPER_DIR="${TOOLS_DIR}/markdown-rag-mcp-wrapper"
MILVUS_COMPOSE_FILE="${MARKDOWN_RAG_DIR}/docker/docker-compose.yml"

# uv executable.
UV_EXE="C:/Users/Danii/AppData/Roaming/Python/Python313/Scripts/uv.exe"

# Build outputs / logs.
DATA_DIR="${FINAL_ROOT}/data"
LOG_DIR="${DATA_DIR}/logs"
LAST_WIKI_DIR_FILE="${DATA_DIR}/last_wiki_dir.txt"

# RAG indexing/search defaults.
RAG_RECURSIVE="false"
RAG_FORCE_REINDEX="true"
RAG_TEST_QUERY="FindBucket"
RAG_SEARCH_THRESHOLD="0.1"
RAG_SEARCH_LIMIT="1"

# Whether build-wiki-rag.sh should start Milvus automatically.
AUTO_START_MILVUS="true"
MILVUS_CONTAINER_NAME="milvus-standalone"
MILVUS_HEALTH_TIMEOUT_SECONDS="120"
